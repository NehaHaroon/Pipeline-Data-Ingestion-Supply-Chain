x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1
  env_file: .env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: HVOKFHsSX9zF4J4ilYwoXfyQsh7Z33KueV1jKmpN1GI=
    AIRFLOW__WEBSERVER__SECRET_KEY: M2_WZ23Uv_JbvzdMpAX6Y0_Q66ioO30W47-Fp_8JzI8
    INGESTION_API_URL: http://ingestion-api:8000
    KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    PYTHONPATH: /opt/airflow/project
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./storage:/opt/airflow/storage
    - ./logs:/opt/airflow/logs
    - ./:/opt/airflow/project
    - ./requirements.txt:/requirements.txt
  networks:
    - pipeline-net

services:
  airflow-postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5433:5432"
    networks:
      - pipeline-net

  airflow-init:
    <<: *airflow-common
    entrypoint: >
      bash -c "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@local.dev"
    depends_on:
      - airflow-postgres

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      - airflow-init

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      - airflow-scheduler

networks:
  pipeline-net:
    name: pipeline-net